<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire Client — Inès Ouajib</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --white: #FFFFFF;
    --ink: #111111;
    --cherry: #8B0435;
    --cherry-light: rgba(139,4,53,0.08);
    --cherry-mid: rgba(139,4,53,0.15);
    --border: #E5E0DA;
    --border-dark: #C8C0B8;
    --muted: #7A746E;
    --muted-light: #A8A29C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Mulish', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 6rem;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  .header-top {
    background: var(--cherry);
    height: 4px;
    width: 100%;
  }

  .header-inner {
    padding: 2.5rem 2rem 2rem;
    display: flex;
    align-items: flex-start;
    gap: 2rem;
    max-width: 780px;
    margin: 0 auto;
  }

  .logo-area {
    flex-shrink: 0;
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    display: block;
  }

  .header-text { flex: 1; }

  .header-eyebrow {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cherry);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 600;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }
  h1 em {
    font-style: italic;
    color: var(--cherry);
  }

  .header-sub {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 0.5rem;
  }

  .info-bar {
    background: var(--ink);
    padding: 1rem 2rem;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .info-bar-inner {
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .info-field {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    flex: 1;
    min-width: 140px;
  }

  .info-label {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cherry);
    font-weight: 600;
    white-space: nowrap;
  }

  .info-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
    min-width: 60px;
  }

  .progress-wrap {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    max-width: 780px;
    margin: 0 auto;
  }

  .progress-wrap-outer {
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  .progress-track {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--cherry);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-pct {
    font-size: 0.7rem;
    color: var(--cherry);
    font-weight: 600;
    min-width: 32px;
    text-align: right;
    letter-spacing: 0.03em;
  }

  .tabs-outer { background: var(--white); border-bottom: 1px solid var(--border); }

  .tabs-inner {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 1.5rem;
    gap: 0;
  }

  .tabs-inner::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 0.9rem 1.1rem;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    font-family: 'Mulish', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.03em;
    margin-bottom: -1px;
  }

  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--cherry); border-bottom-color: var(--cherry); font-weight: 600; }
  .tab.done { color: var(--muted-light); }
  .tab.done::before { content: '✓ '; color: #5A8A5E; }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .section-block { display: none; animation: fadeIn 0.3s ease forwards; }
  .section-block.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
